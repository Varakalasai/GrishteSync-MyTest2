<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Kanban Board</h1>
    <div class="board">
        <div class="list" id="to-do">
            <h2>To-Do</h2>
            <ul id="to-do-list"></ul>
            <button id="add-to-do">Add Card</button>
        </div>
        <div class="list" id="in-progress">
            <h2>In-Progress</h2>
            <ul id="in-progress-list"></ul>
            <button id="add-in-progress">Add Card</button>
        </div>
        <div class="list" id="done">
            <h2>Done</h2>
            <ul id="done-list"></ul>
            <button id="add-done">Add Card</button>
        </div>
    </div>
    <button id="export">Export Cards</button>
    
    <footer>Made with GrishteSync | Suryasticsai | suryasticsai@gmail.com</footer>
</body>
</html>
